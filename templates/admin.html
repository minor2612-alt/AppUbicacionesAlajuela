<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:30px;
        }

        .contenedor{
            max-width:900px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 4px 15px rgba(0,0,0,.15);
            text-align:center;
        }

        h1{
            color:#e67e22;
            margin-bottom:5px;
        }

        h2{
            color:#003f7d;
            margin-top:0;
        }

        .logo{
            max-width:180px;
            margin-bottom:20px;
        }

        .opciones{
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap:15px;
            margin-top:30px;
        }

        .boton{
            display:block;
            padding:18px;
            background:#e67e22;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-size:18px;
            font-weight:bold;
        }

        .boton:hover{
            background:#d35400;
        }

        .salir{
            display:inline-block;
            margin-top:30px;
            padding:12px 20px;
            background:#003f7d;
            color:white;
            text-decoration:none;
            border-radius:6px;
        }

        .salir:hover{
            background:#002b55;
        }
    </style>
</head>

<body>

<div class="contenedor">

    <img src="{{ url_for('static', filename='logo.png') }}" class="logo" alt="Construplaza">

    <h1>Construplaza</h1>
    <h2>Panel de Administración</h2>

    <div class="opciones">
        <a class="boton" href="/nuevo">➕ Agregar producto</a>
        <a class="boton" href="/editar">✏️ Editar producto</a> 
        <a class="boton" href="/eliminar">🗑 Eliminar producto</a>
        <a class="boton" href="/inventario">📋 Ver inventario</a>
    </div>

    <a class="salir" href="/logout">🚪 Cerrar sesión</a>

</div>

</body>
</html>

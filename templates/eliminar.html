<form method="POST">

    {% if coincidencias %}

        <p>
            <strong>
                Seleccione exactamente el registro que desea eliminar:
            </strong>
        </p>

        {% for fila in coincidencias %}
            <label style="display:block; margin:14px 0;">
                <input
                    type="radio"
                    name="id_registro"
                    value="{{ fila.id }}"
                    required
                >

                Código: {{ fila.codigo }}
                — Ubicación: {{ fila.ubicacion or "(sin ubicación)" }}
                — Producto: {{ fila.producto }}
            </label>
        {% endfor %}

        <input
            type="hidden"
            name="codigo"
            value="{{ codigo }}"
        >

        <button
            type="submit"
            onclick="return confirm('¿Está seguro de eliminar únicamente el registro seleccionado?')"
        >
            Eliminar registro seleccionado
        </button>

    {% else %}

        <input
            type="text"
            name="codigo"
            placeholder="Código del producto"
            value="{{ codigo or '' }}"
            required
        >

        <button type="submit">
            Buscar producto
        </button>

    {% endif %}

</form>

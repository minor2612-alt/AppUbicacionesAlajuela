<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Eliminar producto</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:30px;}
.caja{max-width:500px;margin:auto;background:white;padding:30px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,.15);}
h1{color:#c0392b;text-align:center;}
input{width:100%;padding:12px;margin:10px 0;font-size:16px;}
button{width:100%;padding:12px;background:#c0392b;color:white;border:none;border-radius:6px;font-size:18px;}
a{display:block;text-align:center;margin-top:15px;}
.error{color:red;text-align:center;font-weight:bold;}
</style>
</head>
<body>

<div class="caja">
<h1>Eliminar producto</h1>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">
    <input type="text" name="codigo" placeholder="Código del producto a eliminar" required>
    <button type="submit">Eliminar producto</button>
</form>

<a href="/admin">Volver al panel</a>
</div>

</body>
</html>

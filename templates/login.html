<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administrador</title>

    <style>
        body{
            font-family:Arial,sans-serif;
            background:#f5f5f5;
        }

        .caja{
            width:350px;
            margin:80px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            color:#0b5ed7;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            font-size:16px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            font-size:16px;
            background:#0b5ed7;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#084298;
        }

        .error{
            color:red;
            text-align:center;
            margin-top:10px;
        }
    </style>

</head>

<body>

<div class="caja">

<h2>Administrador</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">

<input
type="text"
name="usuario"
placeholder="Usuario"
required>

<input
type="password"
name="password"
placeholder="Contraseña"
required>

<button type="submit">
Ingresar
</button>

</form>

</div>

</body>
</html>

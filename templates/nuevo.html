<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agregar producto</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:30px;
}
.caja{
    max-width:500px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.15);
}
h1{
    color:#e67e22;
    text-align:center;
}
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    font-size:16px;
}
button{
    width:100%;
    padding:12px;
    background:#e67e22;
    color:white;
    border:none;
    border-radius:6px;
    font-size:18px;
}
a{
    display:block;
    text-align:center;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="caja">
<h1>Agregar producto</h1>

<form method="POST">
    <input type="text" name="producto" placeholder="Producto" required>
    <input type="text" name="codigo" placeholder="Código" required>
    <input type="text" name="ubicacion" placeholder="Ubicación" required>

    <button type="submit">Guardar producto</button>
</form>

<a href="/admin">Volver al panel</a>
</div>

</body>
</html>
